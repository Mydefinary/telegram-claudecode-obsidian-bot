name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Lint with py_compile
        run: |
          python -m py_compile bot.py
          python -m py_compile analyzer.py
          python -m py_compile scraper.py
          python -m py_compile obsidian_writer.py
          python -m py_compile evaluator.py
          python -m py_compile kakao_parser.py
          python -m py_compile config.py
          python -m py_compile prompts/__init__.py
          python -m py_compile prompts/ko.py
          python -m py_compile prompts/en.py

      - name: Run tests
        run: pytest tests/ -v
